# PAI Profile: Crypto
# Keybindings: browser, crypto wallets
# (terminal $mod+Return comes from main config)

bindsym $mod+b exec firefox http://localhost:8080
bindsym $mod+Shift+b exec electrum
bindsym $mod+Shift+m exec feather-wallet
bindsym $mod+Shift+s exec firefox file:///opt/pai-wallets/solana-wallet.html
bindsym $mod+Shift+h exec firefox file:///opt/pai-wallets/ethereum-wallet.html
bindsym $mod+Shift+9 exec firefox file:///opt/pai-wallets/bip39.html
bindsym $mod+Shift+p exec firefox https://phantom.app
bindsym $mod+Shift+f exec firefox https://pump.fun
