name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: input
    id: title
    attributes:
      label: Summary
      placeholder: "Brief description of the bug"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Boot PAI from USB
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: "e.g. ThinkPad X1 Carbon 2021, i7-1165G7"

  - type: input
    id: version
    attributes:
      label: PAI Version
      placeholder: "e.g. v0.1.0 or dev/main"
    validations:
      required: true
