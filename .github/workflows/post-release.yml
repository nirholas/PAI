name: Post-release smoke test

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  flasher-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # A release tag push also propagates to the Vercel deploy because
      # website/scripts/build-content.mjs pulls in the new release notes,
      # which changes the tree Astro renders. Rather than sleeping a fixed
      # guess, we poll the published /flash.ps1.sha256 until it matches
      # the sha256 of scripts/flash.ps1 in this checkout — so the smoke
      # test runs against the deploy the release should have produced.
      - name: Wait for Vercel deploy to match current tree
        env:
          SITE_BASE: https://pai.direct
          POLL_TIMEOUT_SECS: '600'
          POLL_INTERVAL_SECS: '10'
        run: |
          set -euo pipefail
          EXPECTED="$(sha256sum scripts/flash.ps1 | awk '{print $1}')"
          echo "expected flash.ps1 sha256: $EXPECTED"
          SHA_URL="$SITE_BASE/flash.ps1.sha256"
          DEADLINE=$(( $(date +%s) + POLL_TIMEOUT_SECS ))
          while :; do
            PUBLISHED="$(curl -fsSL "$SHA_URL" 2>/dev/null | awk '{print $1}' || true)"
            if [[ "$PUBLISHED" == "$EXPECTED" ]]; then
              echo "site flash.ps1 matches current tree ($PUBLISHED)"
              break
            fi
            NOW=$(date +%s)
            if (( NOW >= DEADLINE )); then
              echo "::error::Vercel deploy did not catch up within ${POLL_TIMEOUT_SECS}s"
              echo "  expected: $EXPECTED"
              echo "  got:      ${PUBLISHED:-<empty>}"
              exit 1
            fi
            echo "not yet (got: ${PUBLISHED:-<empty>}); retrying in ${POLL_INTERVAL_SECS}s"
            sleep "$POLL_INTERVAL_SECS"
          done

      - name: Run flasher smoke tests
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/smoke-test-flashers.sh
