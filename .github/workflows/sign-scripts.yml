name: Sign PowerShell scripts
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sign (e.g. v0.2.0)"
        required: true

jobs:
  sign:
    runs-on: windows-latest
    permissions:
      id-token: write   # Required for SignPath's OIDC trust
      contents: write   # To upload signed artifacts back to the release
    steps:
      - uses: actions/checkout@v4

      - name: Download unsigned scripts from release
        run: |
          $tag = "${{ github.event.inputs.tag || github.event.release.tag_name }}"
          gh release download $tag --pattern "flash.ps1" --dir unsigned
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload unsigned artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pai-scripts-unsigned
          path: unsigned/

      - name: Submit to SignPath for signing
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: pai
          signing-policy-slug: release
          artifact-configuration-slug: pai-scripts
          github-artifact-id: ${{ steps.upload.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Replace release assets with signed versions
        run: |
          $tag = "${{ github.event.inputs.tag || github.event.release.tag_name }}"
          gh release upload $tag signed/flash.ps1 --clobber
          # Regenerate SHA256 sidecar from signed file
          Get-FileHash signed/flash.ps1 -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  flash.ps1" } | Out-File flash.ps1.sha256 -Encoding ascii
          gh release upload $tag flash.ps1.sha256 --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update signing transparency log
        run: |
          node scripts/update-signing-log.mjs --tag "${{ github.event.inputs.tag || github.event.release.tag_name }}" --files signed/flash.ps1
          git config user.name 'pai-release-bot'
          git config user.email 'bot@pai.direct'
          git add website/src/data/signing.json
          git commit -m "chore(signing): log signed artifacts for ${{ github.event.inputs.tag || github.event.release.tag_name }}"
          git push origin HEAD:main

      - name: Trigger website rebuild
        run: gh workflow run pages-deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
