name: Update Scoop bucket

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Compute tarball SHA256
        id: sha
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          URL="https://github.com/nirholas/pai/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"          >> "$GITHUB_OUTPUT"

      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          repository: nirholas/scoop-pai
          event-type: pai-release
          client-payload: |
            { "version": "${{ steps.sha.outputs.version }}", "sha256": "${{ steps.sha.outputs.sha }}" }
