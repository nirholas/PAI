name: Publish Imager manifest

# After a release is published, regenerate website/public/imager.json from the
# live GitHub release (which by that point has the arm64 .img.xz + sidecar
# attached) and open a PR so the next website deploy picks up the fresh
# metadata. Users pasting https://pai.direct/imager.json into Raspberry Pi
# Imager then see the new version within ~5 minutes of merge.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Regenerate and validate without opening a PR"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Regenerate manifest from live release
        env:
          PAI_REPO: ${{ github.repository }}
        run: node scripts/gen-imager-manifest.mjs

      - name: Validate manifest (network-aware)
        run: node scripts/validate-imager-manifest.mjs

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- website/public/imager.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (dry run)
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run == true
        run: |
          echo "Manifest would change but dry_run was requested; printing diff."
          git --no-pager diff -- website/public/imager.json

      - name: Open PR
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/refresh-imager-manifest
          delete-branch: true
          commit-message: |
            chore(imager): refresh imager.json for ${{ github.event.release.tag_name || github.ref_name }}
          title: "chore(imager): refresh imager.json for ${{ github.event.release.tag_name || github.ref_name }}"
          body: |
            Regenerated `website/public/imager.json` against the live GitHub
            release so `https://pai.direct/imager.json` serves the current
            `.img.xz` URL, sizes, and SHA256 fields.

            Triggered by: ${{ github.event_name }} (${{ github.event.release.tag_name || github.ref_name }}).

            Validation: `node scripts/validate-imager-manifest.mjs` passed.
          labels: |
            release
            automation
          add-paths: |
            website/public/imager.json

      - name: No-op
        if: steps.diff.outputs.changed != 'true'
        run: echo "imager.json is already up to date; no PR opened."
