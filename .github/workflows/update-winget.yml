name: Submit winget manifest

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true

jobs:
  submit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download zipped CLI and compute SHA256
        id: pkg
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name || github.event.inputs.tag }}"
          $version = $tag -replace '^v',''
          $url = "https://github.com/nirholas/pai/releases/download/$tag/pai-cli-$version.zip"
          Invoke-WebRequest $url -OutFile pai-cli.zip
          $sha = (Get-FileHash pai-cli.zip -Algorithm SHA256).Hash
          "version=$version" >> $env:GITHUB_OUTPUT
          "sha=$sha"          >> $env:GITHUB_OUTPUT

      - name: Submit to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: PAI.PAI
          installers-regex: 'pai-cli-.*\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
