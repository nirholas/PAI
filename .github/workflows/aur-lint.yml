name: Lint AUR PKGBUILDs
on:
  pull_request:
    paths: ['aur-templates/**']
  workflow_dispatch:

jobs:
  namcap:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install namcap
        run: pacman -Sy --noconfirm namcap
      - name: Lint
        run: |
          for p in aur-templates/*/PKGBUILD; do
            echo "=== $p ==="
            namcap "$p" || exit 1
          done
