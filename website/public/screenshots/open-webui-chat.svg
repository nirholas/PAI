<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-label="Open WebUI chat interface running a local Llama model on PAI">
  <rect width="960" height="600" fill="#0f0f1a"/>
  <rect width="960" height="40" fill="#1a1a2e"/>
  <circle cx="20" cy="20" r="5" fill="#f87171"/>
  <circle cx="38" cy="20" r="5" fill="#fbbf24"/>
  <circle cx="56" cy="20" r="5" fill="#4ade80"/>
  <text x="450" y="25" font-family="ui-sans-serif, system-ui" font-size="12" fill="#888">Open WebUI · localhost:8080</text>

  <!-- Sidebar -->
  <rect x="0" y="40" width="220" height="560" fill="#12121f"/>
  <text x="16" y="64" font-family="ui-sans-serif" font-size="11" font-weight="700" fill="#888">CHATS</text>
  <rect x="8" y="74" width="204" height="40" rx="6" fill="rgba(122,162,247,0.12)"/>
  <text x="20" y="92" font-family="ui-sans-serif" font-size="11" fill="#e0e0e0">PAI security model</text>
  <text x="20" y="106" font-family="ui-sans-serif" font-size="9" fill="#888">llama3.2:3b · 2m</text>
  <rect x="8" y="122" width="204" height="40" rx="6" fill="transparent"/>
  <text x="20" y="140" font-family="ui-sans-serif" font-size="11" fill="#e0e0e0">Offline AI workflow</text>
  <text x="20" y="154" font-family="ui-sans-serif" font-size="9" fill="#888">phi3:mini · 1h</text>
  <rect x="8" y="170" width="204" height="40" rx="6" fill="transparent"/>
  <text x="20" y="188" font-family="ui-sans-serif" font-size="11" fill="#e0e0e0">Drafting release notes</text>
  <text x="20" y="202" font-family="ui-sans-serif" font-size="9" fill="#888">mistral:7b · yesterday</text>

  <!-- Main column header -->
  <text x="250" y="68" font-family="ui-sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">PAI security model</text>
  <rect x="820" y="52" width="120" height="24" rx="12" fill="rgba(74,222,128,0.12)" stroke="#4ade80"/>
  <circle cx="834" cy="64" r="3" fill="#4ade80"/>
  <text x="842" y="67" font-family="ui-sans-serif" font-size="10" fill="#4ade80">llama3.2:3b</text>

  <!-- Messages -->
  <g transform="translate(250 100)">
    <rect width="420" height="62" rx="12" fill="rgba(159,122,234,0.15)"/>
    <text x="16" y="26" font-family="ui-sans-serif" font-size="11" fill="#9f7aea" font-weight="600">you</text>
    <text x="16" y="44" font-family="ui-sans-serif" font-size="11" fill="#e0e0e0">Can I trust PAI when it's offline?</text>
    <text x="16" y="54" font-family="ui-sans-serif" font-size="10" fill="#888">How does the model stay up-to-date?</text>
  </g>

  <g transform="translate(250 180)">
    <rect width="690" height="196" rx="12" fill="rgba(122,162,247,0.1)"/>
    <text x="16" y="26" font-family="ui-sans-serif" font-size="11" fill="#7aa2f7" font-weight="600">llama3.2:3b</text>
    <g font-family="ui-sans-serif" font-size="11" fill="#e0e0e0">
      <text x="16" y="50">Offline trust depends on what's on the image at build time:</text>
      <text x="16" y="72">• The ISO is signed and reproducible — verify the SHA256 before flashing.</text>
      <text x="16" y="92">• The model weights are pinned and shipped on the USB.</text>
      <text x="16" y="112">• No software auto-updates in the live session.</text>
      <text x="16" y="140">To refresh the model, boot with persistence enabled and run:</text>
    </g>
    <rect x="16" y="148" width="440" height="32" rx="4" fill="#12121f" stroke="rgba(122,162,247,0.25)"/>
    <text x="28" y="168" font-family="ui-monospace" font-size="11" fill="#4ade80">ollama pull llama3.2:3b</text>
  </g>

  <!-- Input -->
  <rect x="250" y="500" width="690" height="56" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
  <text x="266" y="534" font-family="ui-sans-serif" font-size="12" fill="#888">Message llama3.2:3b…</text>
  <circle cx="908" cy="528" r="18" fill="#7aa2f7"/>
  <path d="M902 528 L914 522 L914 534 Z" fill="#0f0f1a"/>
</svg>
