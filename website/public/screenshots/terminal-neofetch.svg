<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-label="foot terminal on PAI running neofetch with system info and PAI logo in ASCII art">
  <rect width="960" height="600" fill="#0f0f1a"/>

  <!-- Terminal window -->
  <g transform="translate(60 60)">
    <rect width="840" height="480" rx="8" fill="#0b0b15" stroke="rgba(122,162,247,0.35)"/>
    <rect width="840" height="28" rx="8" fill="#1a1a2e"/>
    <rect y="20" width="840" height="8" fill="#1a1a2e"/>
    <circle cx="16" cy="14" r="5" fill="#f87171"/>
    <circle cx="34" cy="14" r="5" fill="#fbbf24"/>
    <circle cx="52" cy="14" r="5" fill="#4ade80"/>
    <text x="380" y="18" font-family="ui-monospace" font-size="11" fill="#888">user@pai-live ~ — foot</text>

    <!-- Prompt -->
    <g font-family="ui-monospace, monospace" font-size="12">
      <text x="20" y="58" fill="#4ade80">user@pai-live<tspan fill="#888">:</tspan><tspan fill="#7aa2f7">~</tspan><tspan fill="#888">$</tspan> <tspan fill="#e0e0e0">neofetch</tspan></text>
    </g>

    <!-- ASCII art PAI logo -->
    <g font-family="ui-monospace, monospace" font-size="14" font-weight="700">
      <text x="20" y="110" fill="#f87171">██████╗</text>
      <text x="120" y="110" fill="#7aa2f7">█████╗</text>
      <text x="220" y="110" fill="#fbbf24">██╗</text>
      <text x="20" y="128" fill="#f87171">██╔══██╗</text>
      <text x="120" y="128" fill="#7aa2f7">██╔══██╗</text>
      <text x="220" y="128" fill="#fbbf24">██║</text>
      <text x="20" y="146" fill="#f87171">██████╔╝</text>
      <text x="120" y="146" fill="#7aa2f7">███████║</text>
      <text x="220" y="146" fill="#fbbf24">██║</text>
      <text x="20" y="164" fill="#f87171">██╔═══╝</text>
      <text x="120" y="164" fill="#7aa2f7">██╔══██║</text>
      <text x="220" y="164" fill="#fbbf24">██║</text>
      <text x="20" y="182" fill="#f87171">██║</text>
      <text x="120" y="182" fill="#7aa2f7">██║  ██║</text>
      <text x="220" y="182" fill="#fbbf24">██║</text>
      <text x="20" y="200" fill="#f87171">╚═╝</text>
      <text x="120" y="200" fill="#7aa2f7">╚═╝  ╚═╝</text>
      <text x="220" y="200" fill="#fbbf24">╚═╝</text>
    </g>

    <!-- Info -->
    <g font-family="ui-monospace, monospace" font-size="12">
      <text x="320" y="108"><tspan fill="#7aa2f7" font-weight="700">user</tspan><tspan fill="#888">@</tspan><tspan fill="#7aa2f7" font-weight="700">pai-live</tspan></text>
      <text x="320" y="124" fill="#888">─────────────────────</text>
      <text x="320" y="142"><tspan fill="#7aa2f7" font-weight="700">OS:</tspan>       <tspan fill="#e0e0e0">PAI Live 0.1.0 x86_64</tspan></text>
      <text x="320" y="160"><tspan fill="#7aa2f7" font-weight="700">Kernel:</tspan>   <tspan fill="#e0e0e0">Linux 6.1.0-pai-amd64</tspan></text>
      <text x="320" y="178"><tspan fill="#7aa2f7" font-weight="700">Shell:</tspan>    <tspan fill="#e0e0e0">bash 5.2.15</tspan></text>
      <text x="320" y="196"><tspan fill="#7aa2f7" font-weight="700">WM:</tspan>       <tspan fill="#e0e0e0">sway 1.8.1</tspan></text>
      <text x="320" y="214"><tspan fill="#7aa2f7" font-weight="700">Terminal:</tspan> <tspan fill="#e0e0e0">foot 1.16.2</tspan></text>
      <text x="320" y="232"><tspan fill="#7aa2f7" font-weight="700">CPU:</tspan>      <tspan fill="#e0e0e0">Intel i5-8350U · 4 cores</tspan></text>
      <text x="320" y="250"><tspan fill="#7aa2f7" font-weight="700">Memory:</tspan>   <tspan fill="#e0e0e0">2.1 GiB / 16 GiB</tspan></text>
      <text x="320" y="268"><tspan fill="#7aa2f7" font-weight="700">AI:</tspan>       <tspan fill="#e0e0e0">ollama 0.3.6 · llama3.2:3b</tspan></text>
      <text x="320" y="284" fill="#888">─────────────────────</text>
    </g>

    <!-- Palette -->
    <g transform="translate(320 296)">
      <rect x="0" width="22" height="10" fill="#e0e0e0"/>
      <rect x="24" width="22" height="10" fill="#f87171"/>
      <rect x="48" width="22" height="10" fill="#fbbf24"/>
      <rect x="72" width="22" height="10" fill="#4ade80"/>
      <rect x="96" width="22" height="10" fill="#7aa2f7"/>
      <rect x="120" width="22" height="10" fill="#9f7aea"/>
      <rect x="144" width="22" height="10" fill="#f472b6"/>
      <rect x="168" width="22" height="10" fill="#888888"/>
    </g>

    <!-- Next prompt with cursor -->
    <g font-family="ui-monospace" font-size="12">
      <text x="20" y="340"><tspan fill="#4ade80">user@pai-live</tspan><tspan fill="#888">:</tspan><tspan fill="#7aa2f7">~</tspan><tspan fill="#888">$</tspan> <tspan fill="#e0e0e0">ollama list</tspan></text>
      <text x="20" y="358" fill="#888">NAME                   ID            SIZE      MODIFIED</text>
      <text x="20" y="374"><tspan fill="#4ade80">llama3.2:3b</tspan>            <tspan fill="#888">365c0bd3c000</tspan>  <tspan fill="#fbbf24">2.0 GB</tspan>    2 days ago</text>
      <text x="20" y="390"><tspan fill="#4ade80">phi3:mini</tspan>              <tspan fill="#888">a2c89ceaed85</tspan>  <tspan fill="#fbbf24">2.2 GB</tspan>    5 days ago</text>
      <text x="20" y="406"><tspan fill="#4ade80">mistral:7b-q4</tspan>          <tspan fill="#888">f974a74358d6</tspan>  <tspan fill="#fbbf24">4.1 GB</tspan>    1 week ago</text>
      <text x="20" y="440"><tspan fill="#4ade80">user@pai-live</tspan><tspan fill="#888">:</tspan><tspan fill="#7aa2f7">~</tspan><tspan fill="#888">$</tspan> <tspan fill="#fbbf24">█</tspan></text>
    </g>
  </g>
</svg>
