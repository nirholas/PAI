<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg-midnight" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a0a1f"/>
      <stop offset="100%" stop-color="#030308"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="screen" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-midnight)"/>

  <!-- Subtle noise grain -->
  <rect width="1920" height="1080" fill="#7aa2f7" opacity="0.02" filter="url(#noise)"/>

