# PAI default active profile — all apps enabled
# Switch profiles by replacing this file with ai.conf / dev.conf / crypto.conf / privacy.conf

bindsym $mod+b exec firefox http://localhost:8080
bindsym $mod+e exec thunar
bindsym $mod+p exec drawing

# Crypto
bindsym $mod+Shift+b exec electrum
bindsym $mod+Shift+p exec firefox https://phantom.app
bindsym $mod+Shift+f exec firefox https://pump.fun

# Privacy
bindsym $mod+Shift+t exec torbrowser-launcher

# Games
bindsym $mod+Shift+g exec aisleriot
