<?xml version="1.0" encoding="UTF-8"?>
<!--
  PAI logo — monochrome red variant.
  Pixel grid: 17 cols x 7 rows, each cell = 32px = 544x224 canvas.
  Letterforms: P (5x7) + gap + A (5x7) + gap + I (3x7).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 544 224" width="544" height="224"
     shape-rendering="crispEdges">
  <style>
    .px { fill: #e54d4d; }
  </style>
  <g class="px">
    <!-- P (cols 0-4) -->
    <rect x="0"   y="0"   width="32" height="32"/>
    <rect x="32"  y="0"   width="32" height="32"/>
    <rect x="64"  y="0"   width="32" height="32"/>
    <rect x="96"  y="0"   width="32" height="32"/>
    <rect x="0"   y="32"  width="32" height="32"/>
    <rect x="128" y="32"  width="32" height="32"/>
    <rect x="0"   y="64"  width="32" height="32"/>
    <rect x="128" y="64"  width="32" height="32"/>
    <rect x="0"   y="96"  width="32" height="32"/>
    <rect x="32"  y="96"  width="32" height="32"/>
    <rect x="64"  y="96"  width="32" height="32"/>
    <rect x="96"  y="96"  width="32" height="32"/>
    <rect x="0"   y="128" width="32" height="32"/>
    <rect x="0"   y="160" width="32" height="32"/>
    <rect x="0"   y="192" width="32" height="32"/>

    <!-- A (cols 6-10, x offset = 192) -->
    <rect x="224" y="0"   width="32" height="32"/>
    <rect x="256" y="0"   width="32" height="32"/>
    <rect x="288" y="0"   width="32" height="32"/>
    <rect x="192" y="32"  width="32" height="32"/>
    <rect x="320" y="32"  width="32" height="32"/>
    <rect x="192" y="64"  width="32" height="32"/>
    <rect x="320" y="64"  width="32" height="32"/>
    <rect x="192" y="96"  width="32" height="32"/>
    <rect x="224" y="96"  width="32" height="32"/>
    <rect x="256" y="96"  width="32" height="32"/>
    <rect x="288" y="96"  width="32" height="32"/>
    <rect x="320" y="96"  width="32" height="32"/>
    <rect x="192" y="128" width="32" height="32"/>
    <rect x="320" y="128" width="32" height="32"/>
    <rect x="192" y="160" width="32" height="32"/>
    <rect x="320" y="160" width="32" height="32"/>
    <rect x="192" y="192" width="32" height="32"/>
    <rect x="320" y="192" width="32" height="32"/>

    <!-- I (cols 12-14, x offset = 384) -->
    <rect x="384" y="0"   width="32" height="32"/>
    <rect x="416" y="0"   width="32" height="32"/>
    <rect x="448" y="0"   width="32" height="32"/>
    <rect x="416" y="32"  width="32" height="32"/>
    <rect x="416" y="64"  width="32" height="32"/>
    <rect x="416" y="96"  width="32" height="32"/>
    <rect x="416" y="128" width="32" height="32"/>
    <rect x="416" y="160" width="32" height="32"/>
    <rect x="384" y="192" width="32" height="32"/>
    <rect x="416" y="192" width="32" height="32"/>
    <rect x="448" y="192" width="32" height="32"/>
  </g>
</svg>
